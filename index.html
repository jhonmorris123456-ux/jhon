<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volta Café — Kasir</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0e0b08;
  --ink2: #2a2018;
  --ink3: #4a3828;
  --warm: #7a5c40;
  --muted: #9e8070;
  --sand: #c8b09a;
  --pale: #e8dcd2;
  --cream: #f4ede4;
  --cream2: #faf6f0;
  --white: #fffefb;
  --gold: #b87d3a;
  --gold2: #d4963f;
  --gold3: #f0b86a;
  --gold-pale: #fde8c0;
  --green: #3a6b45;
  --red: #8b3030;
  --r: 14px;
  --r2: 10px;
  --shadow: 0 2px 16px rgba(14,11,8,0.08);
  --shadow2: 0 8px 32px rgba(14,11,8,0.14);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ========== HEADER ========== */
.header {
  background: var(--ink);
  height: 62px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 200;
  border-bottom: 1px solid var(--ink3);
}

.logo-wrap { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 34px; height: 34px;
  background: var(--gold);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--cream2);
  letter-spacing: 1px;
  line-height: 1;
}
.logo-sub {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 400;
  margin-top: 2px;
  display: block;
}

.nav-desktop { display: flex; gap: 4px; }
.nav-btn {
  background: none;
  border: 1px solid transparent;
  color: var(--muted);
  padding: 7px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  transition: all 0.18s;
  display: flex; align-items: center; gap: 6px;
}
.nav-btn:hover, .nav-btn.active {
  background: rgba(180,125,58,0.12);
  border-color: rgba(180,125,58,0.3);
  color: var(--gold3);
}
.nav-btn .dot {
  width: 6px; height: 6px;
  background: var(--gold);
  border-radius: 50%;
  display: none;
}
.nav-btn.active .dot { display: block; }

.header-right { display: flex; align-items: center; gap: 16px; }
.clock-box { text-align: right; }
.clock-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  color: var(--cream2);
  line-height: 1;
}
.clock-date { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; margin-top: 2px; }

/* Cart toggle button (mobile) */
.cart-toggle-btn {
  display: none;
  background: var(--gold);
  border: none;
  border-radius: 10px;
  width: 38px; height: 38px;
  align-items: center; justify-content: center;
  cursor: pointer;
  position: relative;
  font-size: 18px;
  transition: transform 0.15s;
}
.cart-toggle-btn:active { transform: scale(0.94); }
.cart-toggle-badge {
  position: absolute;
  top: -5px; right: -5px;
  background: var(--red);
  color: #fff;
  font-size: 9px;
  font-weight: 600;
  width: 17px; height: 17px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--ink);
  display: none;
}

/* ========== MOBILE NAV ========== */
.mobile-bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--ink);
  border-top: 1px solid var(--ink3);
  padding: 0 0 env(safe-area-inset-bottom, 0);
  z-index: 150;
  height: 60px;
}
.mobile-nav-inner {
  display: flex;
  height: 60px;
}
.mob-nav-btn {
  flex: 1;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 500;
  transition: color 0.15s;
}
.mob-nav-btn.active { color: var(--gold3); }
.mob-nav-icon { font-size: 20px; line-height: 1; }
.mob-nav-badge {
  position: absolute;
  top: 8px;
  background: var(--gold);
  color: var(--ink);
  font-size: 8px;
  font-weight: 700;
  min-width: 14px; height: 14px;
  border-radius: 7px;
  display: none;
  align-items: center; justify-content: center;
  padding: 0 3px;
}

/* ========== MAIN LAYOUT ========== */
.app-body {
  display: grid;
  grid-template-columns: 1fr 380px;
  height: calc(100vh - 62px);
  overflow: hidden;
}

/* ========== LEFT PANEL ========== */
.panel-left { display: flex; flex-direction: column; overflow: hidden; }

.filter-bar {
  background: var(--white);
  border-bottom: 1px solid var(--pale);
  padding: 14px 20px;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.search-wrap { flex: 1; min-width: 180px; position: relative; }
.search-ico {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  font-size: 14px; pointer-events: none; opacity: 0.5;
}
.search-input {
  width: 100%;
  background: var(--cream2);
  border: 1.5px solid var(--pale);
  color: var(--ink);
  padding: 9px 14px 9px 38px;
  border-radius: 10px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: all 0.18s;
}
.search-input:focus { border-color: var(--gold); background: var(--white); }
.search-input::placeholder { color: var(--muted); }

.cat-scroll { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px; }
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-chip {
  background: var(--cream2);
  border: 1.5px solid var(--pale);
  color: var(--warm);
  padding: 7px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  transition: all 0.18s;
  display: flex; align-items: center; gap: 5px;
}
.cat-chip:hover { border-color: var(--gold); color: var(--gold); }
.cat-chip.active {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--gold3);
}

.products-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 18px 20px;
  padding-bottom: 80px;
}
.products-wrap::-webkit-scrollbar { width: 4px; }
.products-wrap::-webkit-scrollbar-thumb { background: var(--pale); border-radius: 2px; }

.section-head {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.section-head::after { content: ''; flex: 1; height: 1px; background: var(--pale); }

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

/* ========== PRODUCT CARD ========== */
.p-card {
  background: var(--white);
  border: 1.5px solid var(--pale);
  border-radius: var(--r);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.22s cubic-bezier(0.34,1.4,0.64,1);
  position: relative;
}
.p-card:hover:not(.sold-out) {
  border-color: var(--gold2);
  transform: translateY(-3px);
  box-shadow: var(--shadow2);
}
.p-card:active:not(.sold-out) { transform: scale(0.97); }
.p-card.sold-out { opacity: 0.5; cursor: not-allowed; }

.p-img-wrap {
  width: 100%;
  padding-top: 72%;
  position: relative;
  background: var(--cream);
  overflow: hidden;
}
.p-img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}
.p-card:hover:not(.sold-out) .p-img { transform: scale(1.05); }
.p-img-fallback {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 42px;
  background: linear-gradient(135deg, var(--cream) 0%, var(--pale) 100%);
}

.p-badge {
  position: absolute; top: 8px; right: 8px;
  padding: 3px 8px; border-radius: 20px;
  font-size: 9px; font-weight: 600; letter-spacing: 0.5px;
  text-transform: uppercase;
}
.badge-low { background: rgba(139,48,48,0.9); color: #ffe0e0; }
.badge-out { background: rgba(60,50,40,0.85); color: var(--pale); }
.badge-new { background: rgba(58,107,69,0.9); color: #d0f0d8; }

.p-add-overlay {
  position: absolute; inset: 0;
  background: rgba(14,11,8,0.45);
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}
.p-card:hover:not(.sold-out) .p-add-overlay { opacity: 1; }
.p-add-btn {
  background: var(--gold);
  color: var(--ink);
  border: none;
  width: 38px; height: 38px;
  border-radius: 50%;
  font-size: 22px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600;
  transition: transform 0.15s;
}
.p-add-btn:hover { transform: scale(1.1); }

.p-info { padding: 11px 12px 13px; }
.p-kat { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
.p-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink2);
  line-height: 1.2;
  margin-bottom: 4px;
}
.p-desc { font-size: 10px; color: var(--muted); line-height: 1.45; margin-bottom: 8px; }
.p-price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  color: var(--gold);
}

/* ========== RIGHT PANEL ========== */
.panel-right {
  background: var(--white);
  border-left: 1px solid var(--pale);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.cart-head {
  background: var(--ink);
  padding: 18px 20px 14px;
}
.cart-head-row { display: flex; align-items: center; justify-content: space-between; }
.cart-title-wrap {}
.cart-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--cream2);
  line-height: 1;
}
.cart-order-no {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 5px;
  letter-spacing: 0.5px;
}
.cart-count-pill {
  background: rgba(180,125,58,0.2);
  border: 1px solid rgba(180,125,58,0.35);
  color: var(--gold3);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 20px;
}

.cart-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
}
.cart-list::-webkit-scrollbar { width: 3px; }
.cart-list::-webkit-scrollbar-thumb { background: var(--pale); }

.cart-empty {
  height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
  opacity: 0.5;
}
.empty-icon { font-size: 52px; }
.empty-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--warm); }
.empty-sub { font-size: 12px; color: var(--muted); }

/* Cart item */
.cart-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  background: var(--cream2);
  border: 1px solid var(--pale);
  border-radius: var(--r2);
  margin-bottom: 8px;
  animation: slideRight 0.2s ease;
}
@keyframes slideRight { from { opacity:0; transform:translateX(16px); } to { opacity:1; transform:translateX(0); } }

.ci-img {
  width: 44px; height: 44px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--cream);
}
.ci-img-fallback {
  width: 44px; height: 44px;
  border-radius: 8px;
  background: var(--cream);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.ci-info { flex: 1; min-width: 0; }
.ci-name { font-size: 13px; font-weight: 600; color: var(--ink2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ci-unit { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 1px; }
.ci-sub { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--gold); font-weight: 500; margin-top: 2px; }
.ci-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
.qty-row { display: flex; align-items: center; gap: 5px; }
.q-btn {
  width: 26px; height: 26px;
  background: var(--white);
  border: 1px solid var(--pale);
  color: var(--ink);
  border-radius: 7px;
  cursor: pointer;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  line-height: 1;
}
.q-btn:hover { border-color: var(--gold); color: var(--gold); }
.q-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; min-width: 22px; text-align: center; font-weight: 500; }
.ci-del { background: none; border: none; color: var(--red); opacity: 0.4; cursor: pointer; font-size: 13px; padding: 2px; transition: opacity 0.15s; }
.ci-del:hover { opacity: 1; }

/* ========== CART FOOTER ========== */
.cart-footer {
  border-top: 1px solid var(--pale);
  padding: 16px 18px;
  background: var(--cream2);
}

.sum-lines { margin-bottom: 10px; }
.s-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--warm);
  padding: 3px 0;
}
.s-row .v { font-family: 'JetBrains Mono', monospace; }

.disc-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 3px 0;
}
.disc-lbl { font-size: 12px; color: var(--warm); }
.disc-field {
  background: var(--white);
  border: 1px solid var(--pale);
  color: var(--ink);
  padding: 4px 10px;
  border-radius: 7px;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  width: 100px;
  text-align: right;
  outline: none;
}
.disc-field:focus { border-color: var(--gold); }

.total-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0 0;
  border-top: 1.5px solid var(--pale);
  margin-top: 4px;
}
.total-lbl {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--ink2);
}
.total-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 19px;
  color: var(--gold);
  font-weight: 500;
}

/* Payment */
.pay-section { margin-top: 13px; }
.method-tabs { display: flex; gap: 5px; margin-bottom: 11px; }
.meth-btn {
  flex: 1;
  background: var(--white);
  border: 1.5px solid var(--pale);
  color: var(--warm);
  padding: 8px 4px;
  border-radius: 9px;
  cursor: pointer;
  font-size: 11px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  transition: all 0.18s;
}
.meth-ico { font-size: 16px; }
.meth-btn:hover { border-color: var(--gold2); color: var(--gold); }
.meth-btn.active { background: var(--ink); border-color: var(--ink); color: var(--gold3); }

.pay-lbl { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }
.pay-input {
  width: 100%;
  background: var(--white);
  border: 2px solid var(--pale);
  color: var(--ink2);
  padding: 11px 14px;
  border-radius: 10px;
  font-size: 18px;
  font-family: 'JetBrains Mono', monospace;
  text-align: right;
  outline: none;
  transition: border-color 0.18s;
  margin-bottom: 9px;
}
.pay-input:focus { border-color: var(--gold); }

.change-box {
  background: rgba(58,107,69,0.07);
  border: 1px solid rgba(58,107,69,0.2);
  border-radius: 9px;
  padding: 9px 13px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.change-lbl { font-size: 12px; color: var(--green); font-weight: 600; }
.change-val { font-family: 'JetBrains Mono', monospace; font-size: 15px; color: var(--green); font-weight: 500; }

.btn-pay {
  width: 100%;
  background: var(--gold);
  color: var(--ink);
  border: none;
  padding: 14px;
  border-radius: 11px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.3px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-pay:hover:not(:disabled) { background: var(--gold2); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(180,125,58,0.3); }
.btn-pay:active:not(:disabled) { transform: scale(0.98); }
.btn-pay:disabled { opacity: 0.35; cursor: not-allowed; }

.btn-clear {
  width: 100%;
  background: none;
  border: 1px solid rgba(139,48,48,0.2);
  color: var(--red);
  padding: 8px;
  border-radius: 9px;
  font-size: 12px;
  cursor: pointer;
  margin-top: 7px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  transition: all 0.18s;
}
.btn-clear:hover { background: rgba(139,48,48,0.05); border-color: var(--red); }

/* ========== MODAL ========== */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(14,11,8,0.7);
  z-index: 500;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }

.modal {
  background: var(--white);
  border-radius: 22px;
  padding: 32px;
  width: 420px;
  max-width: 95vw;
  max-height: 88vh;
  overflow-y: auto;
  animation: popUp 0.25s cubic-bezier(0.34,1.5,0.64,1);
  border: 1px solid var(--pale);
}
@keyframes popUp { from { transform: scale(0.85); opacity:0; } to { transform: scale(1); opacity:1; } }

.modal-check {
  width: 68px; height: 68px;
  background: rgba(58,107,69,0.1);
  border: 2px solid rgba(58,107,69,0.25);
  border-radius: 50%;
  margin: 0 auto 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px;
}
.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 700;
  text-align: center;
  color: var(--ink2);
  margin-bottom: 3px;
}
.modal-subtitle { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 18px; }

.receipt {
  background: var(--cream2);
  border-radius: 12px;
  border: 1px solid var(--pale);
  padding: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  line-height: 1.9;
}
.rec-hdr { text-align: center; margin-bottom: 10px; }
.rec-hdr strong { font-family: 'Cormorant Garamond', serif; font-size: 17px; color: var(--ink2); letter-spacing: 1.5px; text-transform: uppercase; display: block; }
.rec-hdr small { font-size: 10px; color: var(--muted); line-height: 1.5; }
.rec-divider { border: none; border-top: 1px dashed var(--sand); margin: 7px 0; }
.rec-row { display: flex; justify-content: space-between; color: var(--ink3); }
.rec-total { font-weight: 600; font-size: 13px; color: var(--gold); }
.rec-footer { text-align: center; font-size: 10px; color: var(--muted); line-height: 1.8; margin-top: 4px; }

.modal-actions { display: flex; gap: 10px; margin-top: 18px; }
.m-btn {
  flex: 1;
  padding: 12px;
  border-radius: 11px;
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.18s;
}
.m-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.m-outline { background: var(--cream2); color: var(--ink2); border: 1.5px solid var(--pale); }
.m-solid { background: var(--ink); color: var(--gold3); }

/* ========== TOAST ========== */
.toast {
  position: fixed;
  bottom: 72px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink2);
  color: var(--cream2);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  animation: toastAnim 0.25s ease;
  white-space: nowrap;
  border: 1px solid var(--ink3);
  box-shadow: var(--shadow2);
}
.toast.ok { border-color: rgba(58,107,69,0.4); }
.toast.err { border-color: rgba(139,48,48,0.4); color: #f0b0b0; }
@keyframes toastAnim { from { transform:translateX(-50%) translateY(20px); opacity:0; } to { transform:translateX(-50%) translateY(0); opacity:1; } }

/* ========== VIEWS SYSTEM (mobile) ========== */
.view-panel { display: flex; flex-direction: column; }

/* ========== RESPONSIVE ========== */
@media (max-width: 900px) {
  .nav-desktop { display: none; }
  .cart-toggle-btn { display: flex; }
  .mobile-bottom-nav { display: block; }
  .clock-box { display: none; }

  .app-body {
    grid-template-columns: 1fr;
    height: calc(100vh - 62px - 60px);
  }
  .panel-right {
    display: none;
    position: fixed;
    inset: 62px 0 60px 0;
    border: none;
    z-index: 100;
    overflow-y: auto;
  }
  .panel-right.mobile-visible { display: flex; }
  .panel-left { height: 100%; }
  .products-wrap { padding-bottom: 20px; }

  .cart-toggle-btn { display: flex; }

  .product-grid { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 10px; }
  .filter-bar { padding: 12px 14px; gap: 8px; }
  .header { padding: 0 16px; }
}

@media (max-width: 480px) {
  .product-grid { grid-template-columns: repeat(2, 1fr); }
  .modal { padding: 22px 18px; }
  .cart-footer { padding: 14px 14px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo-wrap">
    <div class="logo-icon">☕</div>
    <div>
      <div class="logo-text">Volta</div>
      <span class="logo-sub">Coffee & Pastry</span>
    </div>
  </div>

  <nav class="nav-desktop">
    <button class="nav-btn active"><span class="dot"></span>☕ Kasir</button>
    <button class="nav-btn">📊 Laporan</button>
    <button class="nav-btn">🗂 Menu</button>
    <button class="nav-btn">⚙️ Pengaturan</button>
  </nav>

  <div class="header-right">
    <div class="clock-box">
      <div class="clock-time" id="clockTime">00:00:00</div>
      <div class="clock-date" id="clockDate"></div>
    </div>
    <button class="cart-toggle-btn" id="cartToggleBtn" onclick="toggleCart()">
      🛒
      <div class="cart-toggle-badge" id="cartToggleBadge">0</div>
    </button>
  </div>
</header>

<!-- APP BODY -->
<div class="app-body">
  <!-- LEFT PANEL -->
  <div class="panel-left">
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input class="search-input" id="searchInput" type="text" placeholder="Cari menu..." oninput="renderMenu()">
      </div>
      <div class="cat-scroll" id="catTabs">
        <button class="cat-chip active" onclick="setKat('',this)">Semua</button>
        <button class="cat-chip" onclick="setKat('kopi',this)">☕ Kopi</button>
        <button class="cat-chip" onclick="setKat('nonkopi',this)">🧋 Non-Kopi</button>
        <button class="cat-chip" onclick="setKat('makanan',this)">🥐 Makanan</button>
        <button class="cat-chip" onclick="setKat('dessert',this)">🍰 Dessert</button>
      </div>
    </div>
    <div class="products-wrap">
      <div class="section-head">Menu Tersedia</div>
      <div class="product-grid" id="menuGrid"></div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right" id="panelRight">
    <div class="cart-head">
      <div class="cart-head-row">
        <div class="cart-title-wrap">
          <div class="cart-title">Pesanan</div>
          <div class="cart-order-no" id="orderNo"></div>
        </div>
        <div class="cart-count-pill" id="cartCount">0 item</div>
      </div>
    </div>

    <div class="cart-list" id="cartList">
      <div class="cart-empty">
        <div class="empty-icon">☕</div>
        <div class="empty-title">Belum ada pesanan</div>
        <div class="empty-sub">Pilih menu di sebelah kiri</div>
      </div>
    </div>

    <div class="cart-footer">
      <div class="sum-lines">
        <div class="s-row"><span>Subtotal</span><span class="v" id="subtotal">Rp 0</span></div>
        <div class="disc-row">
          <span class="disc-lbl">Diskon</span>
          <input class="disc-field" type="number" id="discInput" value="0" min="0" oninput="calcTotal()">
        </div>
      </div>
      <div class="total-bar">
        <span class="total-lbl">Total</span>
        <span class="total-val" id="totalVal">Rp 0</span>
      </div>

      <div class="pay-section">
        <div class="method-tabs">
          <button class="meth-btn active" onclick="setMetode('tunai',this)"><span class="meth-ico">💵</span>Tunai</button>
          <button class="meth-btn" onclick="setMetode('transfer',this)"><span class="meth-ico">🏦</span>Transfer</button>
          <button class="meth-btn" onclick="setMetode('qris',this)"><span class="meth-ico">📱</span>QRIS</button>
        </div>
        <div class="pay-lbl">Uang Diterima</div>
        <input class="pay-input" type="number" id="payInput" placeholder="0" oninput="calcChange()">
        <div class="change-box">
          <span class="change-lbl">Kembalian</span>
          <span class="change-val" id="changeVal">Rp 0</span>
        </div>
        <button class="btn-pay" id="btnPay" onclick="processOrder()" disabled>
          ✓ Selesaikan Pesanan
        </button>
        <button class="btn-clear" onclick="clearAll()">Hapus Semua Pesanan</button>
      </div>
    </div>
  </div>
</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="mobile-bottom-nav">
  <div class="mobile-nav-inner">
    <button class="mob-nav-btn active" onclick="mobileNav('kasir',this)">
      <span class="mob-nav-icon">☕</span>
      Kasir
    </button>
    <button class="mob-nav-btn" onclick="mobileNav('laporan',this)">
      <span class="mob-nav-icon">📊</span>
      Laporan
    </button>
    <button class="mob-nav-btn" style="position:relative" onclick="toggleCart()">
      <span class="mob-nav-icon">🛒</span>
      <div class="mob-nav-badge" id="mobCartBadge">0</div>
      Keranjang
    </button>
    <button class="mob-nav-btn" onclick="mobileNav('menu',this)">
      <span class="mob-nav-icon">🗂</span>
      Menu
    </button>
    <button class="mob-nav-btn" onclick="mobileNav('akun',this)">
      <span class="mob-nav-icon">👤</span>
      Akun
    </button>
  </div>
</nav>

<!-- SUCCESS MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-check">✅</div>
    <div class="modal-title">Pesanan Berhasil!</div>
    <div class="modal-subtitle" id="modalSub"></div>
    <div class="receipt" id="receiptEl"></div>
    <div class="modal-actions">
      <button class="m-btn m-outline" onclick="printReceipt()">🖨 Cetak Struk</button>
      <button class="m-btn m-solid" onclick="newOrder()">Pesanan Baru →</button>
    </div>
  </div>
</div>

<script>
/* ===== DATA ===== */
const MENU = [
  { id:1,  kat:'kopi',    name:'Espresso',        price:22000, stock:99, emoji:'☕', desc:'Single shot espresso pekat',      img:'https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=400&q=80&auto=format' },
  { id:2,  kat:'kopi',    name:'Cappuccino',       price:32000, stock:99, emoji:'🥛', desc:'Espresso dengan steamed milk',    img:'https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=400&q=80&auto=format' },
  { id:3,  kat:'kopi',    name:'Caramel Latte',    price:38000, stock:99, emoji:'☕', desc:'Latte manis sirup karamel',       img:'https://images.unsplash.com/photo-1561047029-3000c68339ca?w=400&q=80&auto=format' },
  { id:4,  kat:'kopi',    name:'Cold Brew',        price:35000, stock:15, emoji:'🧊', desc:'Brew 18 jam, disajikan dingin',   img:'https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5?w=400&q=80&auto=format' },
  { id:5,  kat:'kopi',    name:'V60 Pourover',     price:42000, stock:20, emoji:'☕', desc:'Pour over manual pilihan biji',   img:'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400&q=80&auto=format' },
  { id:6,  kat:'kopi',    name:'Affogato',         price:40000, stock:12, emoji:'🍦', desc:'Espresso disiram es krim vanila', img:'https://images.unsplash.com/photo-1605361865820-56a5cefc0400?w=400&q=80&auto=format' },
  { id:7,  kat:'nonkopi', name:'Matcha Latte',     price:36000, stock:25, emoji:'🍵', desc:'Ceremonial grade matcha Jepang', img:'https://images.unsplash.com/photo-1515823064-d6e0c04616a7?w=400&q=80&auto=format' },
  { id:8,  kat:'nonkopi', name:'Taro Latte',       price:35000, stock:18, emoji:'💜', desc:'Latte creamy rasa talas ungu',   img:'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&q=80&auto=format' },
  { id:9,  kat:'nonkopi', name:'Strawberry Soda',  price:30000, stock:20, emoji:'🍓', desc:'Soda segar dengan stroberi asli',img:'https://images.unsplash.com/photo-1587825140708-dfaf72ae4b04?w=400&q=80&auto=format' },
  { id:10, kat:'nonkopi', name:'Lemon Ginger Tea', price:28000, stock:30, emoji:'🍋', desc:'Teh herbal hangat menyegarkan',  img:'https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=400&q=80&auto=format' },
  { id:11, kat:'nonkopi', name:'Oat Hojicha',      price:38000, stock:10, emoji:'🌾', desc:'Hojicha smoky dengan oat milk',  img:'https://images.unsplash.com/photo-1544787219-7f47ccb76574?w=400&q=80&auto=format' },
  { id:12, kat:'makanan', name:'Croissant',         price:22000, stock:8,  emoji:'🥐', desc:'Croissant mentega lapis-lapis',  img:'https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=400&q=80&auto=format' },
  { id:13, kat:'makanan', name:'Avocado Toast',     price:45000, stock:10, emoji:'🥑', desc:'Sourdough dengan avo & telur',   img:'https://images.unsplash.com/photo-1541519227354-08fa5d50c820?w=400&q=80&auto=format' },
  { id:14, kat:'makanan', name:'French Toast',      price:40000, stock:12, emoji:'🍞', desc:'Roti tebal gula kayu manis',     img:'https://images.unsplash.com/photo-1484723091739-30990f2a1d1c?w=400&q=80&auto=format' },
  { id:15, kat:'makanan', name:'Club Sandwich',     price:55000, stock:8,  emoji:'🥪', desc:'Sandwich isi ayam panggang',     img:'https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=400&q=80&auto=format' },
  { id:16, kat:'makanan', name:'Pasta Carbonara',   price:62000, stock:5,  emoji:'🍝', desc:'Pasta creamy dengan daging asap',img:'https://images.unsplash.com/photo-1612874742237-6526221588e3?w=400&q=80&auto=format' },
  { id:17, kat:'dessert', name:'Tiramisu',          price:42000, stock:6,  emoji:'🍮', desc:'Tiramisu classic resep Italia',  img:'https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?w=400&q=80&auto=format' },
  { id:18, kat:'dessert', name:'Lemon Tart',        price:38000, stock:8,  emoji:'🍰', desc:'Tart lemon kecut manis sempurna',img:'https://images.unsplash.com/photo-1519915028121-7d3463d20b13?w=400&q=80&auto=format' },
  { id:19, kat:'dessert', name:'Chocolate Lava',    price:45000, stock:4,  emoji:'🍫', desc:'Kue coklat leleh di tengahnya',  img:'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=400&q=80&auto=format' },
  { id:20, kat:'dessert', name:'Cheesecake NY',     price:48000, stock:7,  emoji:'🧁', desc:'New York style cheesecake klasik',img:'https://images.unsplash.com/photo-1533134242443-d4fd215305ad?w=400&q=80&auto=format' },
];

let cart = [];
let payMethod = 'tunai';
let orderNo = genNo();
let lastTrx = null;
let katFilter = '';
let cartOpen = false;

document.getElementById('orderNo').textContent = orderNo;

/* ===== CLOCK ===== */
function tick() {
  const n = new Date();
  document.getElementById('clockTime').textContent = n.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('clockDate').textContent = n.toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
tick(); setInterval(tick, 1000);

function rp(n) { return 'Rp ' + Math.round(n).toLocaleString('id-ID'); }
function genNo() {
  const d = new Date();
  const ymd = d.getFullYear().toString().slice(2)+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  return 'VLT-'+ymd+'-'+String(Math.floor(Math.random()*9999)).padStart(4,'0');
}

/* ===== RENDER MENU ===== */
function renderMenu() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('menuGrid');
  const list = MENU.filter(m => {
    const mKat = !katFilter || m.kat === katFilter;
    const mQ = m.name.toLowerCase().includes(q) || m.desc.toLowerCase().includes(q);
    return mKat && mQ;
  });

  if (!list.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:48px 0;color:var(--muted)">
      <div style="font-size:44px;opacity:0.3;margin-bottom:12px">🔍</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:18px">Menu tidak ditemukan</div>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(m => {
    const out = m.stock <= 0;
    const low = m.stock > 0 && m.stock <= 5;
    let badge = '';
    if (out) badge = `<div class="p-badge badge-out">Habis</div>`;
    else if (low) badge = `<div class="p-badge badge-low">Sisa ${m.stock}</div>`;

    return `<div class="p-card ${out?'sold-out':''}" onclick="addToCart(${m.id})">
      <div class="p-img-wrap">
        <img class="p-img" src="${m.img}" alt="${m.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="p-img-fallback" style="display:none">${m.emoji}</div>
        ${badge}
        <div class="p-add-overlay">
          <button class="p-add-btn" onclick="event.stopPropagation();addToCart(${m.id})">+</button>
        </div>
      </div>
      <div class="p-info">
        <div class="p-kat">${m.kat}</div>
        <div class="p-name">${m.name}</div>
        <div class="p-desc">${m.desc}</div>
        <div class="p-price">${rp(m.price)}</div>
      </div>
    </div>`;
  }).join('');
}

function setKat(kat, btn) {
  katFilter = kat;
  document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMenu();
}

/* ===== CART ===== */
function addToCart(id) {
  const item = MENU.find(m => m.id === id);
  if (!item || item.stock <= 0) return;
  const ex = cart.find(c => c.id === id);
  if (ex) {
    if (ex.qty >= item.stock) { toast('⚠ Stok tidak cukup!','err'); return; }
    ex.qty++; ex.sub = ex.qty * ex.price;
  } else {
    cart.push({ id, name:item.name, emoji:item.emoji, img:item.img, price:item.price, qty:1, sub:item.price, stock:item.stock });
  }
  renderCart();
  toast('+ '+item.name,'ok');
}

function changeQty(i, d) {
  const it = cart[i];
  const nq = it.qty + d;
  if (nq <= 0) { cart.splice(i,1); renderCart(); return; }
  if (nq > it.stock) { toast('⚠ Melebihi stok!','err'); return; }
  it.qty = nq; it.sub = nq * it.price;
  renderCart();
}

function removeItem(i) { cart.splice(i,1); renderCart(); }

function clearAll() {
  if (!cart.length) return;
  if (confirm('Hapus semua pesanan?')) { cart = []; renderCart(); }
}

function renderCart() {
  const tot = cart.reduce((a,c)=>a+c.qty,0);
  document.getElementById('cartCount').textContent = tot+' item';

  /* update mobile badge */
  const mobBadge = document.getElementById('mobCartBadge');
  const toggleBadge = document.getElementById('cartToggleBadge');
  if (tot > 0) {
    mobBadge.textContent = tot; mobBadge.style.display = 'flex';
    toggleBadge.textContent = tot; toggleBadge.style.display = 'flex';
  } else {
    mobBadge.style.display = 'none';
    toggleBadge.style.display = 'none';
  }

  const el = document.getElementById('cartList');
  if (!cart.length) {
    el.innerHTML = `<div class="cart-empty">
      <div class="empty-icon">☕</div>
      <div class="empty-title">Belum ada pesanan</div>
      <div class="empty-sub">Pilih menu di sebelah kiri</div>
    </div>`;
    calcTotal(); return;
  }

  el.innerHTML = cart.map((it,i) => {
    const imgEl = it.img
      ? `<img class="ci-img" src="${it.img}" alt="${it.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    return `<div class="cart-item">
      ${imgEl}
      <div class="ci-img-fallback" style="${it.img?'display:none':''}">  ${it.emoji}</div>
      <div class="ci-info">
        <div class="ci-name">${it.name}</div>
        <div class="ci-unit">${rp(it.price)} × ${it.qty}</div>
        <div class="ci-sub">${rp(it.sub)}</div>
      </div>
      <div class="ci-right">
        <div class="qty-row">
          <button class="q-btn" onclick="changeQty(${i},-1)">−</button>
          <span class="q-num">${it.qty}</span>
          <button class="q-btn" onclick="changeQty(${i},1)">+</button>
        </div>
        <button class="ci-del" onclick="removeItem(${i})">✕</button>
      </div>
    </div>`;
  }).join('');

  calcTotal();
}

function calcTotal() {
  const sub = cart.reduce((a,c)=>a+c.sub,0);
  const disc = parseFloat(document.getElementById('discInput').value)||0;
  const total = Math.max(0, sub - disc);
  document.getElementById('subtotal').textContent = rp(sub);
  document.getElementById('totalVal').textContent = rp(total);
  calcChange();
  document.getElementById('btnPay').disabled = cart.length===0 || total<=0;
}

function calcChange() {
  const disc = parseFloat(document.getElementById('discInput').value)||0;
  const sub = cart.reduce((a,c)=>a+c.sub,0);
  const total = Math.max(0, sub-disc);
  const bayar = parseFloat(document.getElementById('payInput').value)||0;
  document.getElementById('changeVal').textContent = rp(Math.max(0, bayar-total));
}

function setMetode(m, btn) {
  payMethod = m;
  document.querySelectorAll('.meth-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

/* ===== PROCESS ===== */
function processOrder() {
  const disc = parseFloat(document.getElementById('discInput').value)||0;
  const sub = cart.reduce((a,c)=>a+c.sub,0);
  const total = Math.max(0, sub-disc);
  const bayar = parseFloat(document.getElementById('payInput').value)||0;

  if (payMethod === 'tunai' && bayar < total) {
    toast('⚠ Uang bayar kurang dari total!','err'); return;
  }

  lastTrx = {
    no: orderNo, items:[...cart], sub, disc, total,
    bayar: payMethod==='tunai'?bayar:total,
    kembalian: payMethod==='tunai'?bayar-total:0,
    metode: payMethod,
    waktu: new Date().toLocaleString('id-ID')
  };

  cart.forEach(ci => {
    const m = MENU.find(m=>m.id===ci.id);
    if (m) m.stock -= ci.qty;
  });

  showModal();
}

function showModal() {
  const t = lastTrx;
  document.getElementById('modalSub').textContent = 'No. Order: '+t.no;
  const rows = t.items.map(it=>
    `<div class="rec-row"><span>${it.emoji} ${it.name} ×${it.qty}</span><span>${rp(it.sub)}</span></div>`
  ).join('');

  document.getElementById('receiptEl').innerHTML = `
    <div class="rec-hdr">
      <strong>VOLTA CAFÉ</strong>
      <small>Jl. Kopi No. 88, Kota Rasa<br>volta.cafe · @voltacafe</small>
    </div>
    <hr class="rec-divider">
    <div class="rec-row"><span>No. Order</span><span>${t.no}</span></div>
    <div class="rec-row"><span>Waktu</span><span>${t.waktu}</span></div>
    <div class="rec-row"><span>Kasir</span><span>Admin</span></div>
    <hr class="rec-divider">
    ${rows}
    <hr class="rec-divider">
    <div class="rec-row"><span>Subtotal</span><span>${rp(t.sub)}</span></div>
    ${t.disc>0?`<div class="rec-row"><span>Diskon</span><span>- ${rp(t.disc)}</span></div>`:''}
    <div class="rec-row rec-total"><span>TOTAL</span><span>${rp(t.total)}</span></div>
    <div class="rec-row"><span>Bayar (${t.metode})</span><span>${rp(t.bayar)}</span></div>
    <div class="rec-row"><span>Kembalian</span><span>${rp(t.kembalian)}</span></div>
    <hr class="rec-divider">
    <div class="rec-footer">Setiap tegukan adalah karya seni.<br>Terima kasih sudah singgah di Volta ☕</div>
  `;

  document.getElementById('modalOverlay').classList.add('show');
}

function printReceipt() {
  const c = document.getElementById('receiptEl').innerHTML;
  const w = window.open('','_blank');
  w.document.write(`<html><head><title>Struk - ${lastTrx.no}</title>
  <style>body{font-family:monospace;font-size:12px;max-width:280px;margin:auto;padding:16px}
  .rec-row{display:flex;justify-content:space-between;margin:2px 0}.rec-total{font-weight:bold;font-size:13px}
  hr{border-top:1px dashed #aaa;border-bottom:none;margin:6px 0}.rec-hdr{text-align:center;margin-bottom:8px}
  strong{font-size:14px;letter-spacing:2px;display:block}.rec-footer{text-align:center;font-size:10px;color:#888;line-height:1.8}
  </style></head><body>${c}</body></html>`);
  w.print(); w.close();
}

function newOrder() {
  cart = [];
  document.getElementById('discInput').value = 0;
  document.getElementById('payInput').value = '';
  document.getElementById('changeVal').textContent = 'Rp 0';
  document.getElementById('modalOverlay').classList.remove('show');
  orderNo = genNo();
  document.getElementById('orderNo').textContent = orderNo;
  if (window.innerWidth <= 900) {
    document.getElementById('panelRight').classList.remove('mobile-visible');
    cartOpen = false;
  }
  renderCart(); renderMenu();
}

/* ===== MOBILE CART TOGGLE ===== */
function toggleCart() {
  const pr = document.getElementById('panelRight');
  cartOpen = !cartOpen;
  if (cartOpen) pr.classList.add('mobile-visible');
  else pr.classList.remove('mobile-visible');
}

function mobileNav(page, btn) {
  document.querySelectorAll('.mob-nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (page !== 'kasir') toast('Fitur '+page+' segera hadir 🚧','ok');
}

/* ===== TOAST ===== */
function toast(msg, type='ok') {
  const t = document.createElement('div');
  t.className = 'toast '+type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}

/* ===== INIT ===== */
renderMenu();
renderCart();
</script>
